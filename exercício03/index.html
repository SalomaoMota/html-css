<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatação de testo</title>
</head>
<body>
    <h1>Principais formatações</h1>
    <h2>Negrito / Destaque</h2>
        <p>Esse é o modo de colocar uma <strong>palavra em negrito</strong></p>
         <p>Esse é o modo de usar o <em>italico</em></p>   
        <p>Esse é o <ins>modo de sublinhar</ins> </p>
        <p><mark>Texto marcado</mark></p>
        <p>Como <small>colocar um <ins>texto pequeno</ins></small></p>
        <p>Podemos colocar um <del>texto excluido</del></p>
        <p>Texto subescrito 2<sup><small>2</small></sup></p>
        <p>Texto do tipo h<sub>2</sub>O</p>
</body>
</html>
