<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Class</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            text-align: center;
            font-size: 3em;
        }

        div > p {
            display: none; /* serve para esconder determinada coisa*/
        }

        div:hover > p {
            display: block; /* serve para mostrar algo que está escondido com na div acima*/
            background-color: red;
            color: white;
            width: 200px;
        }

        div:hover {
            color: rgb(255, 0, 93);
        }
    </style>
</head>
<body>
    <h1>Exemplo de hover</h1>
    <hr>
        <p>Passe o mouse sobre o texto abaixo</p>
    <div>
        Passe o mouse aqui
        <p>Olá, Mundo!</p>
    </div>
        <p>Fim do exemplo</p>
</body>
</html>
