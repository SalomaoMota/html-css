<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Família de Fontes Externa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap');
    
        @import url('https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap');

        body {
           font-family:' Work Sans', Arial, Verdana, sans-serif;
           font-weight: bold; /*urar para negrito (weight, sig peso da letra)*/
        }

        h1 {
            font-family: 'Kaushan Script', sans-serif;
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Quia eius harum placeat quo cumque iure obcaecati ipsam animi culpa totam enim quam iusto repudiandae delectus quis perspiciatis deleniti, provident debitis.</p>
